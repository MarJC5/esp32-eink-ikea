; Projet ESP32 + écran e-ink Waveshare 2.9" (B) V3 — 3 couleurs (noir/blanc/rouge)
; Carte : ESP32-D0WD-V3, 4 MB flash, USB-série CH343
;
; Commandes utiles :
;   pio run                -> compiler
;   pio run -t upload      -> compiler + flasher
;   pio device monitor     -> moniteur série (115200)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 115200          ; prudent (l'upload du stub esptool a échoué en détection)

; Décommente et adapte si l'auto-détection du port échoue :
upload_port = /dev/cu.wchusbserial58FD0148761
monitor_port = /dev/cu.wchusbserial58FD0148761

lib_deps =
    zinggjm/GxEPD2 @ ^1.5.8
    adafruit/Adafruit GFX Library

build_flags =
    -DCORE_DEBUG_LEVEL=1
